name: V&V CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  vv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run validation
        working-directory: scripts
        run: python validate.py

      - name: Run verification
        working-directory: scripts
        run: python verify.py

      # Log point 5: record CI build result
      - name: Log CI build result
        if: always()
        working-directory: scripts
        run: |
          python -c "
          import myLogger
          log = myLogger.giveMeLoggingObject()
          log.info('CI build status: ${{ job.status }} (run_id=${{ github.run_id }}, sha=${{ github.sha }})')
          "

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensick-log
          path: logs/SQA.log
